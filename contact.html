<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1:1 문의 | OSS(オッス)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=39" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body>
  <header class="osshead" id="top"><div class="osshead-in"><a class="osshead-logo" href="index.html">OSSohayo</a><nav class="osshead-nav"><a href="index.html">홈</a><a href="order.html">구매대행 신청</a><a href="delivery.html">배송대행 신청</a><a href="notice.html">공지사항</a><a href="guide.html">이용가이드</a><a href="order-lookup.html">주문조회</a></nav><div class="osshead-icons"><a class="osshead-ic" href="notice.html#search" aria-label="검색"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg></a><div class="osshead-acct"><button class="osshead-ic" type="button" aria-label="계정"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"></circle><path d="M5 20c0-3.6 3.4-5.6 7-5.6s7 2 7 5.6"></path></svg></button><div class="osshead-menu"><a href="login.html">로그인</a><a href="signup.html">회원가입</a><a href="order-lookup.html">주문조회</a><a href="mypage.html">마이페이지</a></div></div></div></div></header>

  <section class="page-hero">
    <div class="container">
      <h1>1:1 문의</h1>
      <p>궁금한 점을 남겨주시면 확인 후 빠르게 답변드립니다. (자주 묻는 질문은 <a href="faq.html" style="color:#fff;text-decoration:underline;">FAQ</a>를 먼저 확인해 보세요)</p>
    </div>
  </section>

  <section class="section">
    <div class="container cs-layout">
      <aside class="cs-sidebar" data-cs="contact"></aside>
      <div class="cs-content">
      <form class="contact-form" id="inquiryForm">
        <label>문의 유형
          <select name="category" required>
            <option value="배송/통관">배송/통관 문의</option>
            <option value="결제">결제 문의</option>
            <option value="취소/환불">취소/환불 문의</option>
            <option value="구매대행">구매대행 문의</option>
            <option value="아이디/비밀번호 찾기">아이디/비밀번호 찾기</option>
            <option value="기타">기타 문의</option>
          </select>
        </label>
        <label>이름 <input type="text" name="name" required placeholder="성함" /></label>
        <label>연락처 <input type="tel" name="phone" required placeholder="답변 받으실 휴대폰 번호" /></label>
        <label>주문번호 (있으면) <input type="text" name="order_no" placeholder="예: OSS-260608-A3F9 (선택)" /></label>
        <label>제목 <input type="text" name="title" required placeholder="문의 제목" /></label>
        <label>내용 <textarea name="body" rows="6" required placeholder="문의 내용을 자세히 적어주세요."></textarea></label>
        <label style="position:absolute;left:-9999px;" aria-hidden="true">이 칸은 비워두세요 <input type="text" name="_hp" tabindex="-1" autocomplete="off" /></label>
        <button type="submit" class="btn btn-primary btn-block" id="inqBtn">문의 보내기</button>
        <p class="contact-note">* 답변은 입력하신 연락처(전화/카카오톡)로 안내드립니다. 평일 10:00~18:00(일본시간) 순차 답변됩니다.</p>
        <p class="login-error" id="inqMsg" style="color:var(--red);text-align:center;margin-top:10px;min-height:18px;"></p>
      </form>
      </div>
    </div>
  </section>

  <footer class="site-footer" id="contact"></footer>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js?v=16"></script>
  <script src="script.js?v=33"></script>
  <script>
    const loadAt = Date.now();
    // 비밀번호/아이디 찾기로 들어온 경우 안내 + 유형 자동선택
    (function () {
      if (new URLSearchParams(location.search).get("type") !== "pw") return;
      const sel = document.querySelector('#inquiryForm select[name="category"]');
      if (sel) sel.value = "아이디/비밀번호 찾기";
      const form = document.getElementById("inquiryForm");
      const note = document.createElement("div");
      note.style.cssText = "background:#FFF6EF;border:1px solid #F6C99B;border-radius:12px;padding:13px 15px;margin-bottom:14px;font-size:13.5px;line-height:1.6;color:#7a4a1f;";
      note.innerHTML = "🔑 <b>비밀번호는 자동 재설정이 안 돼요.</b> 본인 확인 후 관리자가 직접 초기화해 드립니다.<br>아래에 <b>가입 아이디·성함·연락처</b>를 적어주시면 평일 10~18시(일본시간)에 확인 후 연락드릴게요.";
      form.insertBefore(note, form.firstChild);
      const title = form.querySelector('input[name="title"]');
      if (title && !title.value) title.value = "아이디/비밀번호 찾기 요청";
    })();
    document.getElementById("inquiryForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = e.target;
      const msg = document.getElementById("inqMsg");
      const btn = document.getElementById("inqBtn");
      msg.style.color = "var(--red)"; msg.textContent = "";
      if (f._hp.value.trim() !== "") return;
      if (Date.now() - loadAt < 2000) { msg.textContent = "잠시 후 다시 시도해 주세요."; return; }
      const data = new FormData(f);
      const payload = {
        category: data.get("category"), name: data.get("name"), phone: data.get("phone"),
        order_no: data.get("order_no") || null, title: data.get("title"), body: data.get("body"),
        status: "답변대기",
      };
      btn.disabled = true; btn.textContent = "보내는 중...";
      try {
        await window.OSS.submitInquiry(payload);
        msg.style.color = "#16a34a";
        msg.textContent = "✓ 문의가 접수되었습니다. 확인 후 연락드릴게요. 감사합니다!";
        f.reset();
      } catch (err) {
        msg.textContent = "전송 실패: " + (err.message || err);
      }
      btn.disabled = false; btn.textContent = "문의 보내기";
    });
  </script>
</body>
</html>
