  <script>
    const SLUG = "privacy";
    const DEFAULT_BODY = `OSS(オッス, 이하 "회사")는 「개인정보 보호법」 등 관련 법령을 준수하며, 이용자의 개인정보를 보호하기 위해 다음과 같이 개인정보처리방침을 수립·공개합니다.

본 서비스는 일본 현지에서 상품을 구매·집하하여 한국으로 배송하는 구매대행·배송대행 서비스로, 처리 과정에서 개인정보가 일본으로 이전됩니다(아래 6항 참고).

1. 수집하는 개인정보 항목
- 필수: 수취인 이름, 휴대폰번호, 배송지 주소·우편번호, 개인통관고유부호
- 선택: 이메일, 카카오톡 아이디
- 회원: 아이디, 비밀번호(암호화 저장), 주문내역, 회원등급
- 자동수집: 접속기록, 쿠키, 기기·브라우저 정보

2. 수집·이용 목적
- 구매대행·배송대행 접수·처리, 상품 구매·집하·국제배송
- 본인확인, 주문·배송 조회, 고객 문의 응대, 공지 안내
- 관세법 등 법령상 통관 신고 의무 이행
- (선택 동의 시) 이벤트·혜택 등 마케팅 정보 안내

3. 보유 및 이용기간
- 원칙: 수집·이용 목적 달성 시 지체 없이 파기
- 법령에 따른 보관: 계약·청약철회 기록 5년, 대금결제·재화공급 기록 5년, 소비자 불만·분쟁처리 기록 3년(전자상거래법), 접속기록 3개월(통신비밀보호법)
- 개인통관고유부호는 해당 주문의 통관 목적 달성 후 지체 없이 파기

4. 개인정보 처리의 위탁
- 데이터 보관·회원인증: Supabase(클라우드 인프라)
- [사장님 입력: 결제대행·운송 등 추가 위탁사가 있으면 기재]
- 위탁 시 개인정보가 안전하게 관리되도록 감독합니다.

5. 제3자 제공
- 원칙적으로 제3자에게 제공하지 않습니다.
- 다만 통관·배송에 필요한 최소 정보(수취인명·연락처·주소·개인통관고유부호)를 관세청 및 운송사에 제공합니다.

6. 개인정보의 국외 이전
- 회사는 일본 현지 구매·집하·국제배송을 위해 개인정보를 국외로 이전합니다.
  · 이전 국가: 일본
  · 이전 항목: 수취인명, 연락처, 배송지, 개인통관고유부호, 주문 정보
  · 이전 목적: 일본 현지 상품 구매·집하·발송 및 통관
  · 이전 일시·방법: 주문 처리 시 정보통신망을 통해 전송
  · 이전받는 자(일본 측 처리자): オッス (대표 糸矢 来央) · 〒577-0841 大阪府 東大阪市 足代 3-1-25 ハイムリップルパート3 102号 · ossohayo@gmail.com
- 이용자는 국외이전을 거부할 수 있으나, 거부 시 서비스 제공이 제한될 수 있습니다.

7. 고유식별정보(개인통관고유부호) 처리
- 통관 목적으로만 수집·이용하며, 암호화하여 보관하고 목적 달성 후 파기합니다.

8. 이용자의 권리와 행사 방법
- 이용자는 언제든지 본인 개인정보의 열람·정정·삭제·처리정지를 요청할 수 있으며, 아래 보호책임자에게 이메일로 신청하면 지체 없이 조치합니다.

9. 만 14세 미만 아동
- 회사는 만 14세 미만 아동의 회원가입을 받지 않습니다.

10. 안전성 확보 조치
- 비밀번호·고유식별정보 암호화, 접근권한 관리, 접속기록 보관 등.

11. 쿠키의 운영
- 로그인 유지 등을 위해 쿠키를 사용할 수 있으며, 브라우저 설정에서 거부할 수 있습니다.

12. 개인정보 보호책임자
- 책임자: 송상익 (대표)
- 연락처: ossohayo@gmail.com

13. 시행 및 변경
- 본 방침은 시행일부터 적용되며, 변경 시 사이트 공지로 안내합니다.
- 시행일: 2026-06-22

※ [사장님 확인 필요] 사업자등록·통신판매업 신고 완료 후 상호·대표자·사업자등록번호·통신판매업 신고번호·주소를 본 방침과 사이트 푸터에 반영해야 정식 효력을 갖습니다.`;

    (async function () {
      const box = document.getElementById("legalBody");
      let data = null;
      try { if (window.OSS && window.OSS.getPage) data = await window.OSS.getPage(SLUG); } catch (e) {}
      const body = (data && data.body) ? data.body : DEFAULT_BODY;
      const esc = (s) => (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      box.innerHTML = esc(body).replace(/^(제?\d+\s?[조.][^\n]*)$/gm, '<strong style="color:#171310;">$1</strong>').replace(/\n/g, "<br>");
    })();
  </script>
