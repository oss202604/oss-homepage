  <section class="page-hero">
    <div class="container">
      <h1>개인정보처리방침</h1>
      <p>OSS는 이용자의 개인정보를 소중히 보호합니다.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="legal-body" id="legalBody"><p class="section-lead">불러오는 중...</p></div>
    </div>
  </section>

  <footer class="site-footer" id="contact"></footer>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js?v=7"></script>
  <script src="script.js?v=15"></script>
  <script>
    const SLUG = "privacy";
    const DEFAULT_BODY = `OSS(オッス, 이하 "회사")는 「개인정보 보호법」 등 관련 법령을 준수하며, 다음과 같이 개인정보를 처리합니다.

1. 수집하는 개인정보 항목
- 필수: 이름, 연락처(휴대폰), 배송지 주소, 개인통관고유부호
- 선택: 이메일, 카카오톡 아이디

2. 개인정보의 수집·이용 목적
- 구매대행·배송대행 신청 접수 및 처리
- 주문 조회, 배송 안내, 고객 문의 응대
- 통관 신고 등 법령상 의무 이행

3. 개인정보의 보유 및 이용기간
- 관련 법령(전자상거래법 등)에 따른 보관 기간 동안 보유 후 파기합니다.

4. 개인정보의 제3자 제공
- 배송(통관·운송)에 필요한 최소한의 정보를 운송사·관세 당국에 제공하는 경우 외에는 제3자에게 제공하지 않습니다.

5. 이용자의 권리
- 이용자는 언제든지 본인의 개인정보 열람·정정·삭제를 요청할 수 있습니다.

6. 개인정보 보호책임자
- 문의: oss202604@gmail.com

※ 본 방침은 사업자 정보 확정 후 정식 검토하여 보완됩니다.`;

    (async function () {
      const box = document.getElementById("legalBody");
      let data = null;
      try { if (window.OSS && window.OSS.getPage) data = await window.OSS.getPage(SLUG); } catch (e) {}
      const body = (data && data.body) ? data.body : DEFAULT_BODY;
      const esc = (s) => (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      box.innerHTML = esc(body).replace(/\n/g, "<br>");
    })();
  </script>
