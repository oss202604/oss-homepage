<body>
  <header class="osshead" id="top"><div class="osshead-in"><a class="osshead-logo" href="index.html">OSSohayo</a><nav class="osshead-nav"><a href="index.html">홈</a><a href="order.html">구매대행 신청</a><a href="delivery.html">배송대행 신청</a><a href="notice.html" class="on">공지사항</a><a href="guide.html">이용가이드</a><a href="order-lookup.html">주문조회</a></nav><div class="osshead-icons"><a class="osshead-ic" href="notice.html#search" aria-label="검색"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg></a><div class="osshead-acct"><button class="osshead-ic" type="button" aria-label="계정"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"></circle><path d="M5 20c0-3.6 3.4-5.6 7-5.6s7 2 7 5.6"></path></svg></button><div class="osshead-menu"><a href="login.html">로그인</a><a href="signup.html">회원가입</a><a href="order-lookup.html">주문조회</a><a href="mypage.html">마이페이지</a></div></div></div></div></header>

  <section class="page-hero">
    <div class="container">
      <h1>공지사항 · 검색</h1>
      <p>새로운 소식과 자주 묻는 질문(FAQ)을 검색해 보세요.</p>
    </div>
  </section>

  <section class="section">
    <div class="container cs-layout">
      <aside class="cs-sidebar" data-cs="notice"></aside>
      <div class="cs-content">
        <div style="margin-bottom:18px;">
          <input id="searchBox" type="search" placeholder="🔍 공지·FAQ 검색 (예: 배송, 통관, 환불)" style="width:100%;height:48px;padding:0 16px;border:1.5px solid #EFE3DA;border-radius:12px;font-family:inherit;font-size:15px;background:#fff;" />
        </div>
        <div id="faqResults"></div>
        <div class="notice-list" id="noticeList">
          <p class="section-lead">공지사항을 불러오는 중...</p>
        </div>
      </div>
    </div>
  </section>

  <footer class="site-footer" id="contact">
    <div class="container footer-inner">
      <div>
        <p class="footer-logo">OSS <small>オッス</small></p>
        <p class="footer-desc">일본 현지인 구매대행 배대지</p>
      </div>
      <div class="footer-contact">
        <p><i data-lucide="mail" class="ico-inline"></i> 이메일: ossohayo@gmail.com</p>
        <p><i data-lucide="message-circle" class="ico-inline"></i> 카카오톡: @ossohayo</p>
        <p><i data-lucide="clock" class="ico-inline"></i> 상담시간: 평일 10:00 ~ 22:00 (일본시간)</p>
      </div>
    </div>
    <div class="footer-bottom"><div class="container">© 2026 OSS. All rights reserved.</div></div>
  </footer>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js?v=17"></script>
  <script src="script.js?v=36"></script>
  <script>
    function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    function bindAccordion(container){
      container.querySelectorAll(".notice-head").forEach((h) => {
        h.addEventListener("click", () => {
          const body = h.nextElementSibling;
          body.hidden = !body.hidden;
          h.classList.toggle("open", !body.hidden);
        });
      });
    }
    (async function () {
      const wrap = document.getElementById("noticeList");
      const faqBox = document.getElementById("faqResults");
      const search = document.getElementById("searchBox");
      let NOTICES = [], FAQ = [], ok = true;
      try { NOTICES = await window.OSS.fetchNotices(); }
      catch (e) { ok = false; wrap.innerHTML = '<p class="section-lead">공지사항을 불러오지 못했어요: ' + (e.message || e) + '</p>'; }
      try { const f = await window.OSS.getSetting("faq"); if (Array.isArray(f)) FAQ = f; } catch (e) {}

      function noticeCard(n){
        return `<div class="notice-item"><button class="notice-head" type="button">
            <span class="notice-title">${n.pinned ? '<span class="notice-pin">중요</span> ' : ''}${esc(n.title)}</span>
            <span class="notice-date">${(n.created_at||"").slice(0,10)}</span>
          </button><div class="notice-body" hidden>${esc(n.body).replace(/\n/g,"<br>")}</div></div>`;
      }
      function renderNotices(q){
        const list = q ? NOTICES.filter((n) => ((n.title||"") + " " + (n.body||"")).toLowerCase().includes(q)) : NOTICES;
        wrap.innerHTML = list.length ? list.map(noticeCard).join("")
          : '<p class="section-lead">' + (q ? '일치하는 공지가 없어요.' : '등록된 공지사항이 없습니다.') + '</p>';
        bindAccordion(wrap);
      }
      function renderFaq(q){
        if (!q || !FAQ.length) { faqBox.innerHTML = ""; return; }
        const hits = FAQ.filter((it) => ((it.q||"") + " " + (it.a||"") + " " + (it.category||"")).toLowerCase().includes(q));
        faqBox.innerHTML = hits.length
          ? '<h2 class="section-lead" style="margin:0 0 10px;font-size:16px;">❓ FAQ 검색결과 (' + hits.length + ')</h2>'
            + hits.map((it) => `<div class="notice-item"><button class="notice-head" type="button">
                <span class="notice-title">${esc(it.q)}</span>${it.category ? `<span class="notice-date">${esc(it.category)}</span>` : ''}
              </button><div class="notice-body" hidden>${esc(it.a).replace(/\n/g,"<br>")}</div></div>`).join("")
            + '<h2 class="section-lead" style="margin:22px 0 10px;font-size:16px;">📢 공지사항</h2>'
          : "";
        bindAccordion(faqBox);
      }
      function run(){ const q = (search.value || "").trim().toLowerCase(); renderFaq(q); renderNotices(q); }

      if (search) {
        search.addEventListener("input", run);
        const qp = new URLSearchParams(location.search).get("q");
        if (qp) search.value = qp;
        run();
        if (qp || location.hash === "#search") search.focus();
      }
    })();
  </script>
</body>
</html>
