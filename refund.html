  <script src="script.js?v=6"></script>
  <script>
    const SLUG = "refund";
    const DEFAULT_BODY = `OSS(オッス)의 취소·환불 정책은 다음과 같습니다.

1. 구매대행 취소
- 회사가 현지에서 상품을 구매하기 전(결제 전 단계)에는 전액 취소·환불이 가능합니다.
- 회사가 이미 현지 구매를 완료한 경우, 일본 현지 쇼핑몰의 반품 정책에 따라 취소가 제한될 수 있으며, 현지 반품 수수료가 발생할 수 있습니다.

2. 배송대행 취소
- 상품이 일본 센터에 입고되기 전에는 신청 취소가 가능합니다.
- 입고 후에는 검수·보관·반송 비용이 발생할 수 있습니다.

3. 환불 방법 및 기간
- 환불은 결제 수단 또는 등록된 계좌로 진행되며, 확인 후 영업일 기준 3~7일 이내 처리됩니다.
- 국제배송비, 현지 수수료, 결제 수수료 등 실비는 환불 금액에서 차감될 수 있습니다.

4. 단순 변심·오배송
- 상품 불량 또는 회사 귀책 오배송은 회사 부담으로 처리합니다.
- 단순 변심에 의한 반품은 왕복 배송비 및 수수료가 이용자 부담입니다.

5. 통관·세금
- 통관 과정에서 발생하는 관세·부가세는 이용자 부담이며 환불 대상이 아닙니다.

※ 본 정책은 사업자 정보 확정 후 정식 검토하여 보완됩니다.`;

    (async function () {
      const box = document.getElementById("legalBody");
      let data = null;
      try { if (window.OSS && window.OSS.getPage) data = await window.OSS.getPage(SLUG); } catch (e) {}
      const body = (data && data.body) ? data.body : DEFAULT_BODY;
      const esc = (s) => (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      box.innerHTML = esc(body).replace(/\n/g, "<br>");
    })();
  </script>
