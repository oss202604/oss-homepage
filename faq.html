  <script src="supabase.js?v=4"></script>
  <script src="script.js?v=6"></script>
  <script>
    const DEFAULT_FAQ = [
      { category: "배송/통관", q: "배송은 얼마나 걸리나요?", a: "입고·검수·결제 완료 후 항공 기준 평균 3~5일 내 발송되며, 통관 상황에 따라 달라질 수 있습니다." },
      { category: "배송/통관", q: "개인통관고유부호가 꼭 필요한가요?", a: "네, 해외직구 통관에는 개인통관고유부호가 필요합니다. 관세청 유니패스에서 무료로 발급받을 수 있어요." },
      { category: "결제", q: "결제는 어떻게 하나요?", a: "현재는 견적 안내 후 계좌이체로 진행됩니다. (간편결제는 추후 도입 예정)" },
      { category: "취소/환불", q: "주문을 취소할 수 있나요?", a: "현지에서 상품을 구매하기 전에는 취소가 가능합니다. 구매 완료 후에는 현지 쇼핑몰 정책에 따라 제한될 수 있어요." },
      { category: "기타", q: "여러 쇼핑몰 상품을 한 번에 받을 수 있나요?", a: "네, 합배송 신청으로 여러 주문을 한 박스로 묶어 배송비를 절약할 수 있습니다." },
    ];
    const esc = (s) => (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    (async function () {
      let list = DEFAULT_FAQ;
      try {
        const f = await window.OSS.getSetting("faq");
        if (Array.isArray(f) && f.length) list = f;
      } catch (e) {}
      const cats = ["전체", ...Array.from(new Set(list.map((x) => x.category || "기타")))];
      const tabs = document.getElementById("faqTabs");
      const box = document.getElementById("faqList");
      function render(cat) {
        const items = cat === "전체" ? list : list.filter((x) => (x.category || "기타") === cat);
        box.innerHTML = items.length ? items.map((x) => `
          <div class="notice-item">
            <button class="notice-head" type="button">
              <span class="notice-title"><span class="faq-cat">${esc(x.category || "기타")}</span> ${esc(x.q)}</span>
            </button>
            <div class="notice-body" hidden>${esc(x.a).replace(/\n/g, "<br>")}</div>
          </div>`).join("") : '<p class="section-lead">등록된 질문이 없습니다.</p>';
        box.querySelectorAll(".notice-head").forEach((h) => h.addEventListener("click", () => {
          const b = h.nextElementSibling; b.hidden = !b.hidden; h.classList.toggle("open", !b.hidden);
        }));
      }
      tabs.innerHTML = cats.map((c, i) => `<button class="faq-tab${i === 0 ? " active" : ""}" data-cat="${esc(c)}">${esc(c)}</button>`).join("");
      tabs.querySelectorAll(".faq-tab").forEach((b) => b.addEventListener("click", () => {
        tabs.querySelectorAll(".faq-tab").forEach((x) => x.classList.remove("active"));
        b.classList.add("active"); render(b.dataset.cat);
      }));
      render("전체");
    })();
  </script>
