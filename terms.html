  <script>
    const SLUG = "terms";
    const DEFAULT_TITLE = "이용약관";
    const DEFAULT_BODY = `제1조 (목적)
본 약관은 OSS(オッス, 이하 "회사")가 제공하는 일본 구매대행 및 배송대행(배대지) 서비스(이하 "서비스")의 이용과 관련하여 회사와 이용자의 권리·의무 및 책임사항을 규정함을 목적으로 합니다.

제2조 (용어의 정의)
1. "구매대행"이란 이용자의 요청에 따라 회사가 일본 현지 쇼핑몰에서 상품을 대신 구매하여 이용자에게 배송하는 서비스를 말합니다.
2. "배송대행"이란 이용자가 직접 구매한 일본 상품을 회사의 일본 현지 센터에서 수령·검수 후 한국으로 발송하는 서비스를 말합니다.

제3조 (서비스의 내용)
회사는 구매대행, 배송대행, 합배송, 검수, 주문조회 등의 서비스를 제공합니다. 상품가·수수료·국제배송비는 신청 시점의 안내 기준에 따릅니다.

제4조 (이용자의 의무)
1. 이용자는 정확한 배송지·연락처·개인통관고유부호 등을 제공해야 합니다.
2. 관세법 등 관련 법령을 위반하는 분할배송, 허위신고, 금지품목 요청은 할 수 없습니다.

제5조 (면책)
회사는 천재지변, 통관 지연, 현지 쇼핑몰 사정 등 회사의 통제를 벗어난 사유로 인한 지연·손해에 대하여 책임을 지지 않습니다.

※ 본 약관은 사업자 정보 확정 후 정식 검토하여 보완됩니다.`;

    (async function () {
      const box = document.getElementById("legalBody");
      let data = null;
      try { if (window.OSS && window.OSS.getPage) data = await window.OSS.getPage(SLUG); } catch (e) {}
      const body = (data && data.body) ? data.body : DEFAULT_BODY;
      const esc = (s) => (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      box.innerHTML = esc(body).replace(/\n/g, "<br>");
    })();
  </script>
