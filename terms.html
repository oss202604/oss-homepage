  <script>
    const SLUG = "terms";
    const DEFAULT_TITLE = "이용약관";
    const DEFAULT_BODY = `제1조 (목적)
본 약관은 OSS(オッス, 이하 "회사")가 제공하는 일본 구매대행 및 배송대행(배대지) 서비스(이하 "서비스")의 이용과 관련하여 회사와 이용자의 권리·의무 및 책임사항을 규정함을 목적으로 합니다.

제2조 (용어의 정의)
1. "구매대행"이란 이용자의 요청에 따라 회사가 일본 현지 쇼핑몰에서 상품을 대신 구매하여 이용자에게 배송하는 서비스를 말합니다.
2. "배송대행"이란 이용자가 직접 구매한 일본 상품을 회사의 일본 현지 센터에서 수령·검수 후 한국으로 발송하는 서비스를 말합니다.

제3조 (서비스의 내용)
회사는 구매대행, 배송대행, 합배송, 검수, 주문조회 등의 서비스를 제공합니다. 상품가·수수료·국제배송비는 신청 시점의 안내 기준에 따릅니다.

제4조 (이용자의 의무)
1. 이용자는 정확한 배송지·연락처·개인통관고유부호 등을 제공해야 합니다.
2. 관세법 등 관련 법령을 위반하는 분할배송, 허위신고, 금지품목 요청은 할 수 없습니다.

제5조 (결제)
1. 구매대행 상품가 및 구매대행 수수료는 무통장입금(선결제)으로 하며, 입금 확인 후 회사가 현지 구매를 진행합니다.
2. 국제배송비 및 관·부가세는 상품 입고·무게 측정 후 별도(2차)로 청구되며, 결제 완료 후 출고됩니다.
3. 입금자명은 주문하신 분의 성함으로 해 주셔야 하며, 미입금·오입금 시 처리가 지연될 수 있습니다.

제6조 (청약철회 및 환불)
청약철회·취소·환불에 관한 사항은 회사가 별도로 게시하는 「취소·환불 정책」에 따릅니다.

제7조 (회원)
1. 회원가입은 이용자가 본 약관 및 개인정보처리방침에 동의하고 가입 절차를 완료함으로써 성립합니다.
2. 회원은 주문내역 조회, 등급별 혜택 등을 이용할 수 있으며, 언제든지 탈퇴를 요청할 수 있습니다.
3. 회원등급·혜택은 회사 정책에 따라 운영되며, 등급 변동은 이용자에게 불이익을 주지 않습니다. (※ 회원 기능 오픈 시 적용)

제8조 (면책)
회사는 천재지변, 통관 지연, 현지 쇼핑몰 사정 등 회사의 통제를 벗어난 사유로 인한 지연·손해에 대하여 책임을 지지 않습니다.

제9조 (약관의 변경)
회사는 관련 법령을 위반하지 않는 범위에서 약관을 변경할 수 있으며, 변경 시 시행일 7일 전(이용자에게 불리한 변경은 30일 전)부터 사이트에 공지합니다.

제10조 (준거법 및 관할)
본 약관은 대한민국 법령에 따라 해석되며, 분쟁에 관한 소는 관련 법령이 정한 관할법원에 제기합니다.

[회사 정보] [사장님 입력: 상호 · 대표자 · 사업자등록번호 · 통신판매업 신고번호 · 주소 · 이메일(oss202604@gmail.com)]

※ 본 약관은 사업자등록·통신판매업 신고 완료 후 회사 정보를 반영하여 정식 효력을 가지며, 최종 시행 전 법무 검토를 권장합니다.`;

    (async function () {
      const box = document.getElementById("legalBody");
      let data = null;
      try { if (window.OSS && window.OSS.getPage) data = await window.OSS.getPage(SLUG); } catch (e) {}
      const body = (data && data.body) ? data.body : DEFAULT_BODY;
      const esc = (s) => (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      box.innerHTML = esc(body).replace(/\n/g, "<br>");
    })();
  </script>
