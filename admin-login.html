<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 로그인 | OSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=3" />
  <link rel="stylesheet" href="admin.css?v=3" />
</head>
<body>
  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <h1>OSS 관리자</h1>
      <p class="login-sub">운영자 전용 페이지입니다.</p>
      <form id="adminLoginForm">
        <label>이메일<input type="email" id="adminEmail" required placeholder="관리자 이메일" autocomplete="username" /></label>
        <label>비밀번호<input type="password" id="adminPw" required placeholder="비밀번호" autocomplete="current-password" /></label>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">로그인</button>
        <p class="login-error" id="loginError"></p>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js?v=6"></script>
  <script>
    // 이미 로그인돼 있으면 바로 관리자 페이지로
    window.OSS.adminGetSession().then((session) => {
      if (session) location.href = "admin.html";
    });

    document.getElementById("adminLoginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("adminEmail").value.trim();
      const pw = document.getElementById("adminPw").value;
      const errEl = document.getElementById("loginError");
      const btn = document.getElementById("loginBtn");
      errEl.textContent = "";
      btn.disabled = true; btn.textContent = "로그인 중...";
      try {
        await window.OSS.adminSignIn(email, pw);
        location.href = "admin.html";
      } catch (err) {
        const m = (err && err.message) || "";
        if (/not confirmed/i.test(m)) {
          errEl.textContent = "이메일 인증이 안 된 계정이에요. Supabase에서 계정을 'Auto Confirm' 상태로 다시 만들어 주세요.";
        } else if (/invalid login/i.test(m)) {
          errEl.textContent = "이메일 또는 비밀번호가 맞지 않아요.";
        } else {
          errEl.textContent = "로그인 실패: " + m;
        }
        btn.disabled = false; btn.textContent = "로그인";
      }
    });
  </script>
</body>
</html>
