<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 로그인 | OSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=23" />
  <link rel="stylesheet" href="admin.css?v=3" />
  <style>
    /* 로그인 결과 팝업 */
    .login-modal-box { max-width: 380px; text-align: center; }
    .lm-ico { font-size: 46px; line-height: 1; margin-bottom: 10px; }
    .login-modal-box h3 { margin-bottom: 6px; }
    .login-modal-box .modal-sub { margin-bottom: 22px; }
    .login-modal-box .btn { margin-top: 4px; }
  </style>
</head>
<body>
  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <h1>OSS 관리자</h1>
      <p class="login-sub">운영자 전용 페이지입니다.</p>
      <form id="adminLoginForm">
        <label>이메일<input type="email" id="adminEmail" required placeholder="관리자 이메일" autocomplete="username" /></label>
        <label>비밀번호<input type="password" id="adminPw" required placeholder="비밀번호" autocomplete="current-password" /></label>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">로그인</button>
      </form>
    </div>
  </div>

  <!-- ===== 로그인 결과 팝업 ===== -->
  <div class="modal" id="loginModal" hidden>
    <div class="modal-box login-modal-box">
      <div class="lm-ico" id="lmIco">⚠️</div>
      <h3 id="lmTitle">로그인 실패</h3>
      <p class="modal-sub" id="lmMsg"></p>
      <button type="button" class="btn btn-primary btn-block" id="lmClose">확인</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js?v=7"></script>
  <script>
    // ============================================================
    // 등록된 관리자 이메일 목록 (아이디/비번 구분용)
    // ⚠️ 실제 관리자 이메일을 여기에 넣으세요. 여러 명이면 콤마로 추가.
    //    Supabase Authentication > Users 에 만든 이메일과 똑같아야 합니다.
    //    (관리자 페이지 설정에 admin_emails 가 있으면 그 값으로 덮어씁니다.)
    // ============================================================
    let ADMIN_EMAILS = ["oss202604@gmail.com"].map((s) => s.toLowerCase());

    const modal = document.getElementById("loginModal");
    const lmIco = document.getElementById("lmIco");
    const lmTitle = document.getElementById("lmTitle");
    const lmMsg = document.getElementById("lmMsg");
    const btn = document.getElementById("loginBtn");

    function showPopup(ok, title, msg) {
      lmIco.textContent = ok ? "✅" : "⚠️";
      lmTitle.textContent = title;
      lmMsg.textContent = msg;
      modal.hidden = false;
    }
    function closePopup() { modal.hidden = true; }
    document.getElementById("lmClose").addEventListener("click", closePopup);
    modal.addEventListener("click", (e) => { if (e.target === modal) closePopup(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape" && !modal.hidden) closePopup(); });

    // 이미 로그인돼 있으면 바로 관리자 페이지로
    window.OSS.adminGetSession().then((session) => {
      if (session) location.href = "admin.html";
    });
    // 관리자 이메일 목록을 설정에서 불러오면 덮어쓰기 (선택)
    if (window.OSS && window.OSS.getSetting) {
      window.OSS.getSetting("admin_emails").then((v) => {
        if (Array.isArray(v) && v.length) ADMIN_EMAILS = v.map((s) => String(s).toLowerCase());
      }).catch(() => {});
    }

    document.getElementById("adminLoginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("adminEmail").value.trim().toLowerCase();
      const pw = document.getElementById("adminPw").value;

      // 1) 빈 칸 체크
      if (!email) { showPopup(false, "아이디를 입력하세요", "관리자 이메일을 입력해 주세요."); return; }
      if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { showPopup(false, "이메일 형식 오류", "이메일 형식이 올바르지 않아요. (예: name@gmail.com)"); return; }
      if (!pw) { showPopup(false, "비밀번호를 입력하세요", "비밀번호를 입력해 주세요."); return; }

      // 2) 아이디(이메일)가 등록된 관리자 목록에 없으면 → 아이디 오류
      if (ADMIN_EMAILS.length && !ADMIN_EMAILS.includes(email)) {
        showPopup(false, "아이디가 틀렸어요", "등록된 관리자 이메일이 아니에요. 이메일 주소를 다시 확인해 주세요.");
        return;
      }

      // 3) 비밀번호 검증 (서버)
      btn.disabled = true; btn.textContent = "로그인 중...";
      try {
        await window.OSS.adminSignIn(email, pw);
        showPopup(true, "로그인 성공", "관리자 페이지로 이동합니다.");
        setTimeout(() => { location.href = "admin.html"; }, 800);
      } catch (err) {
        const m = (err && err.message) || "";
        if (/not confirmed/i.test(m)) {
          showPopup(false, "이메일 인증이 필요해요", "계정은 있지만 이메일 인증이 안 됐어요. Supabase에서 'Auto Confirm User'로 다시 만들어 주세요.");
        } else if (/invalid login/i.test(m)) {
          showPopup(false, "비밀번호가 틀렸어요", "아이디(이메일)는 맞지만 비밀번호가 일치하지 않아요. 다시 입력해 주세요.");
        } else {
          showPopup(false, "로그인 실패", m || "알 수 없는 오류가 발생했어요.");
        }
        btn.disabled = false; btn.textContent = "로그인";
      }
    });
  </script>
</body>
</html>
