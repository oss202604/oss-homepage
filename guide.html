    const GUIDE_PAGES = [
      { slug: "guide-how", title: "이용방법" },
      { slug: "guide-purchase", title: "구매대행 안내" },

    ];
    // 기본 내용 (관리자 설정에서 입력하면 덮어씀)
    const DEFAULT_GUIDE = {
      "guide-how": `OSS는 일본 현지인이 직접 운영하는 구매대행·배송대행지(배대지) 서비스입니다. 링크만 보내주시면 일본 상품을 대신 구매해 한국까지 안전하게 보내드려요.

[구매대행 이용 흐름]
1. 링크 보내기 — 사고 싶은 일본 상품의 링크·옵션(색상/사이즈)·수량을 주문서에 적어주세요.
2. 견적 확인·결제 — 상품가 + 수수료(3%)를 안내드리면 계좌로 입금해 주세요. 입금이 확인되면 바로 구매(사입)에 들어갑니다.
3. 물건 사입 — 일본 현지에서 대신 구매합니다. (품절·가격변동 시 안내)
4. 검수·포장·무게 측정 — 센터에서 상품을 확인하고 안전하게 포장한 뒤 무게를 잽니다.
5. 배송비 결제 — 무게로 확정된 국제배송비를 결제해 주세요. (예치금을 충전해두면 자동 차감되어 바로 출고)
6. 통관 — 한국 세관 통관을 거칩니다. (개인통관고유부호 필요)
7. 집으로 배송 — CJ대한통운으로 받아보세요. 주문조회에서 진행상황을 확인할 수 있어요.

[배송대행은?] 이미 일본에서 직접 구매하셨다면, OSS 배대지로 받아 한국까지 보내드려요. (아래 '배송대행 안내' 참고)

* 처음이시면 예상비용 계산기로 대략 비용을 먼저 확인해 보세요.`,
      "guide-purchase": `[구매대행 이용안내]
- 메루카리·라쿠텐·야후옥션·아마존JP·ZOZOTOWN·유니클로 등 일본 온라인 쇼핑몰 상품을 대신 구매해 드립니다.
- 신청 시 상품 링크, 옵션(색상·사이즈), 수량을 정확히 적어주세요. 상품 사진을 함께 주시면 더 정확합니다.
- 구매대행 수수료는 상품가의 3%입니다.
- 공식 판매처 여부는 고객님이 확인해 주세요. 비공식 사이트로 인한 가품·미발송은 책임지기 어렵습니다.
- 입금(결제)이 확인되면 바로 현지 구매를 진행하며, 품절·가격변동 시 안내드립니다.
- 신청 후 24시간 내 미결제 시 자동 취소되며, 현지 구매가 시작된 뒤에는 취소·변경이 어렵습니다. (미주문 건만 예외)`,
      "guide-delivery": `[배송대행 이용안내]
- 일본에서 직접 구매하신 상품을 OSS 일본 센터(배대지)로 받아, 한국까지 안전하게 배송해 드립니다.
- 일본 쇼핑몰에서 결제할 때 받는사람을 'OSS / 주문번호'로, 주소는 '배송센터 주소'(왼쪽 메뉴)로 입력해 주세요.
- 주문하신 일본 송장번호(트래킹넘버)를 신청서에 적어주시면 입고 매칭이 빨라요.
- 여러 쇼핑몰 상품을 모아 한 박스로 보내는 합배송으로 배송비를 아낄 수 있어요.
- 센터 입고 후 검수 → 포장 → 무게측정 → 배송비 결제 → 발송 순서로 진행됩니다.
- 입고 후 30일까지 무료 보관, 이후 보관료가 발생할 수 있습니다.`,
      "guide-center": `[OSS 일본 배송센터(배대지) 주소]
배송대행으로 일본에서 직접 구매하신 상품은 아래 주소로 보내주세요.

받는사람(受取人) : OSS / 주문번호
〒577-0841
大阪府 東大阪市 足代 3-1-25
ハイムリップルパート3 102号
Tel : 070-1381-4638

- 받는사람에 반드시 'OSS / 주문번호'를 적어주세요. 주문번호가 없으면 어느 분 물건인지 확인이 늦어집니다.
- 배송대행 신청서를 먼저 작성하시면 주문번호가 발급됩니다.
- 주소는 위 일본어 그대로 입력하시면 됩니다.
- 구매대행으로 주문하신 경우에는 OSS가 알아서 이 센터로 받으니, 따로 보내실 필요가 없어요.`,
      "guide-fee": `[국제배송 요금안내]
국제배송비는 상품 무게(부피무게 포함)로 계산됩니다. 입고·포장 후 실제 무게를 재서 확정해 안내드려요.

[표준요금 — 일본(항공)]
0.5kg … 1,000엔
1kg … 1,150엔
1.5kg … 1,300엔
2kg … 1,450엔
2.5kg … 1,600엔
3kg … 1,750엔
3.5kg … 1,900엔
4kg … 2,050엔
4.5kg … 2,200엔
5kg … 2,350엔
10kg … 3,850엔
15kg … 6,350엔
20kg … 9,350엔
30kg … 14,350엔
※ 0.5kg마다 +150엔이며, 10kg을 넘으면 증가폭이 커져요. 더 무겁거나 해상 요금은 예상비용 계산기로 확인하세요.

- 정확한 예상 금액은 '예상비용 계산기'에서 상품가·무게를 넣어 바로 확인하실 수 있어요.
- 합배송(여러 건을 한 박스로)하면 무게가 합쳐져 박스당 배송비가 절약됩니다.
- 회원 등급(실버·골드·다이아·레드)별 배송비 할인(최대 10%)은 추후 도입 예정이에요.
- 구매대행 수수료(상품가 3%)와 관·부가세는 배송비와 별도입니다.
- 배송비 결제가 완료되어야 출고되며, 예치금을 충전해두시면 자동 차감되어 바로 출고됩니다.`,
      "guide-addon": `[부가서비스 안내]
필요하시면 신청서 요청사항란이나 카톡으로 요청해 주세요.

- 검수 : 기본 검수(사이즈·색상·수량·심한 파손)는 무료입니다. 봉제·오염 등 정밀검수는 요청 시 진행해요. (전자제품 작동 테스트·대형상품 정밀검수는 어려워요)
- 포장 옵션 : 신발박스 제거(폴리백 포장)·의류박스 제거로 무게·부피를 줄일 수 있어요. 깨지기 쉬운 상품은 안전포장(에어캡)을 요청해 주세요.
- 검수 사진 : 출고 전 상품 사진을 보내드릴 수 있어요.
- 합배송 : 여러 주문을 모아 한 박스로 보내드려요.
* 일부 부가서비스는 소정의 비용이 들 수 있으며, 결제 전에 안내드립니다.`,
      "guide-customs": `[통관·관세 안내]
- 해외직구 통관에는 '개인통관고유부호'가 반드시 필요합니다. (수취인 본인 명의)
- 발급 : 관세청 유니패스( https://unipass.customs.go.kr/csp/persIndex.do )에서 무료로 발급·조회할 수 있어요.
- 목록통관 면세 한도 : 물품가격 미화 150달러(약 ¥23,900) 이하인 자가사용 물품은 관세·부가세가 면제될 수 있습니다.
- 면세 한도를 초과하거나 일반통관 대상 품목은 관세 + 부가세(10%)가 부과되며, 고객 부담입니다.
- 품목분류(통관 유형)에 따라 세금이 달라지므로 신청 시 품목을 정확히 선택해 주세요.
- 통관부호 오류·수취인명 불일치로 인한 통관 지연·반송은 책임지기 어렵습니다.
- 분할배송, 가격 허위신고 등 불법 통관 요청에는 협조하지 않습니다.`,
      "guide-prohibited": `[항공 배송 금지·제한 품목]
항공 운송·통관 규정상 아래 품목은 배송이 제한되거나 불가합니다. 신청 전 꼭 확인해 주세요.

[배송 불가]
- 인화성·가연성 물질 (라이터·부탄가스·스프레이·향수 일부)
- 리튬배터리 단독 (보조배터리 등) · 화기·총포·도검류 · 마약류 · 현금·유가증권
- 가품·이미테이션 (통관 불가)

[제한·주의]
- 액체·화장품 (용량·수량 제한) · 의약품·건강식품 (개인 자가사용 수량 한정)
- 식품 (품목에 따라 통관 제한 가능) · 동식물·종자

- 통관 불가 품목으로 인한 반송·폐기·벌금은 책임지기 어렵습니다.
- 헷갈리는 품목은 신청 전 카톡으로 문의해 주세요. (통관 가능 여부는 관세청 125로도 확인 가능)`,
      "guide-refund": `[취소·환불·반품 안내]
- 구매대행 : 현지 구매 전에는 전액 취소 가능, 구매 후에는 현지 쇼핑몰 정책에 따라 제한·수수료가 발생할 수 있습니다.
- 배송대행 : 센터 입고 전 취소 가능, 입고 후에는 검수·보관·반송 비용이 발생할 수 있습니다.
- 단순 변심 반품은 왕복 배송비·수수료가 고객 부담이며, 구매대행 수수료는 환불되지 않습니다.
- 상품 불량·회사 귀책 오배송은 회사 부담으로 환불 또는 교환해 드립니다.
- 환불은 확인 후 영업일 기준 3~7일 내 처리되며, 국제배송비·현지 수수료 등 실비는 차감될 수 있습니다.
- 자세한 내용은 취소·환불정책 페이지를 참고해 주세요.`,
    };
    function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    (async function () {
      const nav = document.getElementById("guideNav");
      const content = document.getElementById("guideContent");
      let loaded = {};
      let map = {};
      try {
        const all = await window.OSS.fetchPages();
        all.forEach((p) => (map[p.slug] = p));
      } catch (e) { /* 기본 내용으로 진행 */ }
      GUIDE_PAGES.forEach((g) => {
        const p = map[g.slug];
        loaded[g.slug] = { title: (p && p.title) || g.title, body: (p && p.body) ? p.body : (DEFAULT_GUIDE[g.slug] || "") };
      });
      nav.innerHTML = GUIDE_PAGES.map((g, i) => `<button class="guide-nav-btn${i===0?' active':''}" data-slug="${g.slug}">${esc(loaded[g.slug].title)}</button>`).join("");
      function linkify(s){ return esc(s).replace(/\[([^\]\n]{1,40})\]/g,'<b class="gb-h">[$1]</b>').replace(/\n/g,"<br>").replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener" style="color:var(--blue);word-break:break-all;">$1</a>'); }
      function show(slug) {
        const d = loaded[slug];
        let extra = "";
        if (slug === "guide-center") extra = '<div style="margin-top:14px;"><button type="button" id="copyCenterBtn" class="btn btn-primary">📋 배송센터 주소 복사</button> <span id="copyCenterMsg" style="font-size:13px;color:#1F9D6B;font-weight:600;"></span></div>';
        content.innerHTML = `<h2 class="guide-title">${esc(d.title)}</h2><div class="guide-body">${linkify(d.body)}</div>${extra}`;
        if (slug === "guide-center") {
          const cb = document.getElementById("copyCenterBtn");
          if (cb) cb.addEventListener("click", function () {
            const msg = document.getElementById("copyCenterMsg");
            navigator.clipboard.writeText(d.body).then(
              function () { msg.textContent = "✓ 복사됐어요! 일본 쇼핑몰 배송지에 붙여넣으세요."; },
              function () { msg.style.color = "#c0392b"; msg.textContent = "복사 실패 — 주소를 길게 눌러 직접 복사해 주세요."; }
            );
          });
        }
        nav.querySelectorAll(".guide-nav-btn").forEach((b) => b.classList.toggle("active", b.dataset.slug === slug));
      }
      nav.querySelectorAll(".guide-nav-btn").forEach((b) => b.addEventListener("click", () => show(b.dataset.slug)));
      show(GUIDE_PAGES[0].slug);
    })();
  </script>
</body>
