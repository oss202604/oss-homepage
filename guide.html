      "guide-how": `OSS는 일본 현지인이 직접 운영하는 구매대행·배송대행지(배대지) 서비스입니다. 링크만 보내주시면 일본 상품을 대신 구매해 한국까지 안전하게 보내드려요.

[구매대행 이용 흐름]
1. 링크 보내기 — 사고 싶은 일본 상품의 링크·옵션(색상/사이즈)·수량을 주문서에 적어주세요.
2. 견적 확인·결제 — 상품가 + 수수료(3%)를 안내드리면 계좌로 입금해 주세요. 입금이 확인되면 바로 구매(사입)에 들어갑니다.
3. 물건 사입 — 일본 현지에서 대신 구매합니다. (품절·가격변동 시 안내)
4. 검수·포장·무게 측정 — 센터에서 상품을 확인하고 안전하게 포장한 뒤 무게를 잽니다.
5. 배송비 결제 — 무게로 확정된 국제배송비를 결제해 주세요. (예치금을 충전해두면 자동 차감되어 바로 출고)
6. 통관 — 한국 세관 통관을 거칩니다. (개인통관고유부호 필요)
7. 집으로 배송 — CJ대한통운으로 받아보세요. 주문조회에서 진행상황을 확인할 수 있어요.

[배송대행은?] 이미 일본에서 직접 구매하셨다면, OSS 배대지로 받아 한국까지 보내드려요. (아래 '배송대행 안내' 참고)

* 처음이시면 예상비용 계산기로 대략 비용을 먼저 확인해 보세요.`,
      "guide-purchase": `[구매대행 신청방법]
일본 쇼핑몰 상품을 OSS가 대신 구매해 한국까지 보내드려요. 아래 순서로 진행돼요.

[1단계 · 상품 찾기]
- 메루카리·라쿠텐·야후옥션·아마존JP·ZOZOTOWN·유니클로 등에서 원하는 상품을 찾아요.
💡 어디서 살지 모르겠으면 왼쪽 '일본 추천 쇼핑몰'을 참고하세요.

[2단계 · 신청서 작성]
- 회원가입 후 '구매대행 신청'에서 상품 정보를 입력해요.
✓ 상품 링크(URL) · 가격 · 수량 · 옵션(색상·사이즈) · 상품 사진(선택)
✓ 받는분 : 수취인명 · 휴대폰 · 개인통관고유부호 · 주소
⚠️ 옵션은 정확히 적어주세요. (누락 시 확인이 늦어져요)

[3단계 · 견적 확인 · 1차 결제(상품가)]
- 상품가 + 구매대행 수수료(3%)를 안내드려요. 안내된 계좌로 입금(무통장)해 주세요.
⚠️ 입금 확인되면 바로 현지 구매(사입)가 시작돼요. 1차 결제 후에는 취소·변경이 어려우니 신중히! (현지 미구매 건만 예외)

[4단계 · 현지 사입]
- OSS가 일본 현지에서 대신 구매해요. 품절·가격변동 시 안내드리고, 구매 불가 시 환불 또는 대체 안내.

[5단계 · 센터 입고 · 검수]
✓ OSS 일본 센터 도착 후 기본 검수(수량·색상·파손 확인)를 거쳐 '입고완료' 처리돼요. (기본 검수 무료)

[6단계 · 합배송 · 포장 · 무게 측정]
✓ 여러 건을 한 박스로 모으는 합배송으로 배송비를 아낄 수 있어요.
⚠️ 이 단계부터 상품 추가는 어려워요. (주소·통관부호 수정은 가능)

[7단계 · 2차 결제(국제배송비)]
- 확정된 국제배송비를 결제하면 한국으로 출고돼요.
⚠️ 출고 후에는 정보 수정이 어려우니 주소·통관부호를 미리 확인!

[8단계 · 통관 · 배송 완료]
- 한국 세관 통관(개인통관고유부호 필요) 후 택배로 받아보세요.
💡 받으신 후 구매후기를 남겨주시면 큰 힘이 돼요!

[꼭 알아두기]
⚠️ 공식 판매처 여부는 고객님이 확인해 주세요. 비공식 사이트 가품·미발송은 책임지기 어려워요.
⚠️ 가격 허위신고(언더밸류) 등 불법 통관 요청에는 협조하지 않습니다.
✓ 진행 상황은 '주문조회' 또는 마이페이지에서 실시간 확인 가능.`,
      "guide-delivery": `[배송대행 신청방법]
일본에서 **직접 구매**하신 상품을 OSS 일본 센터(배대지)로 받아 한국까지 보내드려요. 아래 순서로 진행돼요.

1) 배송대행 신청서 작성
- 회원가입 후 '배송대행 신청'에서 받는분 정보(수취인명·휴대폰·개인통관고유부호·주소)를 입력하면 **주문번호**가 발급돼요.

2) 일본몰에서 OSS 센터로 발송
- 일본 쇼핑몰 결제 시 **받는사람 = OSS / 주문번호**, 주소 = **배송센터(배대지) 주소**(왼쪽 메뉴)로 입력하세요.
✓ 일본 송장번호(트래킹)를 신청서에 적어주시면 입고 매칭이 빨라요.
⚠️ 받는사람에 주문번호를 빠뜨리면 누구 물건인지 확인이 늦어져요.

3) 센터 입고 · 검수
- 센터 도착 후 기본 검수(수량·파손 확인)를 거쳐 '입고완료' 처리돼요. (기본 검수 무료)

4) 합배송 · 포장 · 무게 측정
- 여러 쇼핑몰 상품을 한 박스로 모으는 **합배송**으로 배송비를 아낄 수 있어요.
- 포장 후 실제 무게를 재서 국제배송비를 확정해요.

5) 2차 결제(국제배송비) · 출고
- 확정된 국제배송비를 결제하면 한국으로 출고돼요.

6) 통관 · 배송 완료
- 한국 세관 통관(개인통관고유부호 필요) 후 택배로 받아보세요.

[보관 안내]
✓ 입고 후 무료 보관 기간이 있어요.
⚠️ 무료 기간이 지나면 보관료가 발생할 수 있어요. (기간·금액은 '수수료 안내' 참고)`,
      "guide-center": `[OSS 일본 배송센터(배대지) 주소]
배송대행으로 일본에서 직접 구매하신 상품은 아래 주소로 보내주세요.

받는사람(受取人) : OSS / 주문번호
〒577-0841
大阪府 東大阪市 足代 3-1-25
ハイムリップルパート3 102号
Tel : 070-1381-4638

- 받는사람에 반드시 'OSS / 주문번호'를 적어주세요. 주문번호가 없으면 어느 분 물건인지 확인이 늦어집니다.
- 배송대행 신청서를 먼저 작성하시면 주문번호가 발급됩니다.

- 구매대행으로 주문하신 경우에는 OSS가 알아서 이 센터로 받으니, 따로 보내실 필요가 없어요.`,
      "guide-fee": `[국제배송 요금안내]
국제배송비는 상품 무게(부피무게 포함)로 계산됩니다. 입고·포장 후 실제 무게를 재서 확정해 안내드려요.

[표준요금 — 일본(항공)]
|무게|항공 요금|
|0.5kg|1,000엔|
|1kg|1,150엔|
|1.5kg|1,300엔|
|2kg|1,450엔|
|2.5kg|1,600엔|
|3kg|1,750엔|
|3.5kg|1,900엔|
|4kg|2,050엔|
|4.5kg|2,200엔|
|5kg|2,350엔|
|10kg|3,850엔|
|15kg|6,350엔|
|20kg|9,350엔|
|30kg|14,350엔|
💡 0.5kg마다 +150엔, 10kg 초과 시 증가폭이 커져요. 정확한 금액은 홈 '예상비용 계산'에서 확인하세요.

- 정확한 예상 금액은 '예상비용 계산기'에서 상품가·무게를 넣어 바로 확인하실 수 있어요.
- 합배송(여러 건을 한 박스로)하면 무게가 합쳐져 박스당 배송비가 절약됩니다.
- 회원 등급(실버·골드·다이아·레드)별 배송비 할인(최대 10%)은 추후 도입 예정이에요.
- 구매대행 수수료(상품가 3%)와 관·부가세는 배송비와 별도입니다.
- 배송비 결제가 완료되어야 출고되며, 예치금을 충전해두시면 자동 차감되어 바로 출고됩니다.`,
      "guide-money": `[예치금(머니충전) 안내]
예치금을 미리 충전해두면 국제배송비가 자동 차감되어, 결제 단계 없이 바로 출고돼요. 자주 받으시는 분께 편리해요.

[이용 방법] (오픈 예정)
1. 마이페이지 > 나의 통장에서 '예치금 충전'을 선택해요.
2. 충전할 금액을 입력하고 안내된 방법으로 입금해요.
3. 입금이 확인되면 예치금이 적립되고, 이후 배송비·수수료가 자동 차감돼요.
4. 남은 예치금은 본인 명의 계좌로 환불 신청할 수 있어요.

[안내]
- 예치금 충전은 현재 준비 중이에요. 정식 오픈 전까지는 건별 계좌 입금(무통장)으로 결제해 주세요.
- 충전·환불 세부 안내는 오픈 시 공지로 다시 알려드릴게요.`,
      "guide-grade": `[회원등급 및 혜택]
OSS는 이용해 주실수록 배송비를 더 깎아드려요. 등급은 **출고 완료 건수**에 따라 올라가요.

[등급별 혜택]
|등급|승급 조건|국제배송비 할인|
|비회원|-|없음|
|실버|회원가입 시|1%|
|골드|출고완료 5건|3%|
|다이아|출고완료 10건|5%|
|레드(VIP)|출고완료 20건|10%|

[안내]
✓ 로그인하면 등급 할인이 예상비용·정산에 자동 반영돼요.
✓ 신규 가입 시 배송비 할인 쿠폰을 드려요. (마이페이지 > 쿠폰함)
💡 등급은 '출고완료'(배송 보낸) 건수 기준으로 올라가요.`,
      "guide-addon": `[부가서비스 안내]

        h += '<b class="gb-h">[서비스 종류]</b><table class="fee-table"><tr><th>구분</th><th>내용</th></tr><tr><td>구매대행</td><td>상품 구매부터 한국 배송까지 OSS가 전부 대행</td></tr><tr><td>배송대행</td><td>고객님이 직접 구매 → OSS 일본센터로 받아 한국까지 배송</td></tr></table>';
        h += '<b class="gb-h">[결제 구조]</b><table class="fee-table"><tr><th>구분</th><th>결제 항목</th></tr><tr><td>1차 결제</td><td>상품가 + 구매대행 수수료 <span class="fee-big">' + pct + '%</span> <span style="color:#8a7f76;font-size:13px;">(배송대행은 1차 없음)</span></td></tr><tr><td>2차 결제</td><td>국제배송비(무게 기준) — 입고·측정 후 안내</td></tr><tr><td>통관 시</td><td>관·부가세 — 면세 한도 초과 시 실비(고객 부담)</td></tr></table>';
        h += '<b class="gb-h">[기타 비용]</b><table class="fee-table"><tr><th>항목</th><th class="r">비용</th></tr><tr><td>기본 검수(수량·색상·파손 확인)</td><td class="r">무료</td></tr><tr><td>무료 보관</td><td class="r">입고 후 ' + freeDays + '일</td></tr><tr><td>보관료(무료기간 초과)</td><td class="r">' + (perDay > 0 ? won(perDay) + ' / 일' : '무료') + '</td></tr><tr><td>국내 배송비</td><td class="r">무료</td></tr></table>';
        if (grades.length){
          h += '<b class="gb-h">[회원등급 배송비 할인]</b><table class="fee-table"><tr><th>등급</th><th class="r">국제배송비 할인</th></tr><tr><td>비회원</td><td class="r">-</td></tr>';
          grades.forEach(function(g){ h += '<tr><td>' + esc(g.name || '') + '</td><td class="r">' + (Number(g.discountPct) || 0) + '%</td></tr>'; });
          h += '</table>';
        }
        h += '<b class="gb-h">[적용 환율]</b><div class="gb-check">' + esc(fxTxt) + '</div>';
        if (rRows.length){
          h += '<b class="gb-h">[국제배송 요금(일부)]</b><table class="fee-table"><tr><th>무게</th><th class="r">항공</th></tr>';
          rRows.forEach(function(r){ h += '<tr><td>' + r.kg + 'kg</td><td class="r">' + Number(r.air || 0).toLocaleString() + '엔</td></tr>'; });
          h += '</table><div class="gb-check">전체 요금표는 <strong>국제배송 요금안내</strong>, 정확한 예상비용은 홈 \'예상비용 계산\'에서 확인하세요.</div>';
        }
        h += '<div class="guide-warning">⚠️ 1차 결제(상품 구매) 후에는 취소·변경이 어려워요. 가격 허위신고(언더밸류) 등 불법 통관 요청에는 협조하지 않습니다.</div>';
        return h + '</div>';
      }
      function show(slug) {
        if (slug === "guide-charge") { content.innerHTML = chargeHtml(); nav.querySelectorAll(".guide-nav-btn").forEach((b) => b.classList.toggle("active", b.dataset.slug === slug)); return; }
        const d = loaded[slug];
        let extra = "";
        if (slug === "guide-center") extra = '<div style="margin-top:14px;"><button type="button" id="copyCenterBtn" class="btn btn-primary">📋 배송센터 주소 복사</button> <span id="copyCenterMsg" style="font-size:13px;color:#1F9D6B;font-weight:600;"></span></div>';
        const bodyHtml = linkify(d.body).replace("{{TARIFF}}", tariffHtml());
        content.innerHTML = `<h2 class="guide-title">${esc(d.title)}</h2><div class="guide-body">${bodyHtml}</div>${extra}`;
        const tabsBox = content.querySelector(".tariff-tabs");
        if (tabsBox) tabsBox.addEventListener("click", function (e) {
          const b = e.target.closest(".tariff-tab"); if (!b) return;
          const i = b.dataset.i;
          tabsBox.querySelectorAll(".tariff-tab").forEach((x) => x.classList.toggle("on", x.dataset.i === i));
          content.querySelectorAll(".tariff-panel").forEach((p) => { p.hidden = (p.dataset.i !== i); });
        });
        if (slug === "guide-center") {
          const cb = document.getElementById("copyCenterBtn");
          if (cb) cb.addEventListener("click", function () {
            const msg = document.getElementById("copyCenterMsg");
            navigator.clipboard.writeText(d.body).then(
              function () { msg.textContent = "✓ 복사됐어요! 일본 쇼핑몰 배송지에 붙여넣으세요."; },
              function () { msg.style.color = "#c0392b"; msg.textContent = "복사 실패 — 주소를 길게 눌러 직접 복사해 주세요."; }
            );
          });
        }
        nav.querySelectorAll(".guide-nav-btn").forEach((b) => b.classList.toggle("active", b.dataset.slug === slug));
      }
      nav.querySelectorAll(".guide-nav-btn").forEach((b) => b.addEventListener("click", () => show(b.dataset.slug)));
      var _hash = (location.hash || "").replace("#", "");
      show(_hash && loaded[_hash] ? _hash : GUIDE_PAGES[0].slug);
      window.addEventListener("hashchange", function () { var s = (location.hash || "").replace("#", ""); if (s && loaded[s]) show(s); });
    })();
  </script>
</body>
</html>
