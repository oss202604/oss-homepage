  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="guide-content.js?v=1"></script>
  <script>
    const GUIDE_PAGES = window.OSS_GUIDE.PAGES;
    const DEFAULT_GUIDE = window.OSS_GUIDE.DEFAULT;
    function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    (async function () {
      const nav = document.getElementById("guideNav");
      const content = document.getElementById("guideContent");
      let loaded = {};
      let map = {};
      try {
        const all = await window.OSS.fetchPages();
        all.forEach((p) => (map[p.slug] = p));
      } catch (e) { /* 기본 내용으로 진행 */ }
      let feeCfg = { fee: {}, fx: {}, grades: [], rates: [] };
      try {
        const fc = await Promise.all([window.OSS.getSetting("fee_policy"), window.OSS.getSetting("exchange_rate"), window.OSS.getSetting("member_grades"), window.OSS.getSetting("shipping_rates")]);
        feeCfg = { fee: fc[0] || {}, fx: fc[1] || {}, grades: Array.isArray(fc[2]) ? fc[2] : [], rates: Array.isArray(fc[3]) ? fc[3] : [] };
      } catch (e) {}
      GUIDE_PAGES.forEach((g) => {
        const p = map[g.slug];
        loaded[g.slug] = { title: (p && p.title) || g.title, body: (p && p.body) ? p.body : (DEFAULT_GUIDE[g.slug] || "") };
      });
      nav.innerHTML = '<p class="cs-sidebar-title">이용가이드</p>' + GUIDE_PAGES.map((g, i) => `<button class="guide-nav-btn${i===0?' active':''}" data-slug="${g.slug}">${esc(loaded[g.slug].title)}</button>`).join("");
      function linkify(s){
        s = esc(s).replace(/(?:^\|[^\n]*\|[ \t]*(?:\n|$))+/gm, function(block){
          var rows = block.trim().split(/\n/).map(function(l){ return l.trim().replace(/^\||\|$/g,'').split('|').map(function(c){ return c.trim(); }); });
          var h = '<table class="fee-table">';
          rows.forEach(function(cells, i){ var tag = i===0?'th':'td'; h += '<tr>' + cells.map(function(c, j){ return '<' + tag + (j>0?' class="r"':'') + '>' + c + '</' + tag + '>'; }).join('') + '</tr>'; });
          return h + '</table>\n';
        });
        return s
          .replace(/\n{2,}/g,'\n')
          .replace(/\*\*([^*\n]{1,80})\*\*/g,'<strong>$1</strong>')
          .replace(/^\[([^\]\n]{1,40})\][ \t]*\n?/gm,'<b class="gb-h">$1</b>')
          .replace(/^⚠️[ \t]*([^\n]+)\n?/gm,'<div class="guide-warning">⚠️ $1</div>')
          .replace(/^💡[ \t]*([^\n]+)\n?/gm,'<div class="guide-tip">💡 $1</div>')
          .replace(/^✓[ \t]*([^\n]+)\n?/gm,'<div class="gb-check">$1</div>')
          .replace(/\n/g,"<br>")
          .replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener" style="color:var(--blue);word-break:break-all;">$1</a>');
      }
      var TARIFF = {
        "의류·패션잡화": [["가방·지갑·가죽제품","8%","-","10%"],["일반 시계","8%","-","10%"],["고급 시계(200만원 초과)","8%","특소20%·교육30%","10%"],["립스틱·마스카라·펜슬","6.5%","-","10%"],["속옷(브라·거들)","13%","-","10%"],["스카프·머플러·숄","8%(편물 13%)","-","10%"],["기초화장품(스킨·로션)","8%","-","10%"],["색조화장품","6.5%","-","10%"],["목욕용 화장품(비누·면도·두발)","5%","-","10%"],["신발","13%","-","10%"],["의류","13%","-","10%"],["유아용 의류","8%","-","10%"],["장갑·손수건","8%","-","10%"],["향수(60ml 1병 면세)","6.5%","특소7%·교육30%","10%"]],
        "레저·스포츠": [["골프용품·골프채","8%","-","10%"],["공·라켓","8%","-","10%"],["낚시용품","8%","-","10%"],["수영용품","8%","-","10%"],["스케이트·스키","8%","-","10%"],["스포츠 헬멧","8%","-","10%"],["스포츠 글러브·신발","13%","-","10%"],["운동용구·자전거","8%","-","10%"],["텐트","13%","-","10%"],["고무 타이어","5%","-","10%"]],
        "전자제품": [["일반 카메라","8%","-","10%"],["디지털 카메라","0%","-","10%"],["고급 디카(100만원 초과)","8%","특소20%·교육30%","10%"],["휴대폰","0%","-","10%"],["LCD·LED TV·TV류","8%","-","10%"],["MP3 플레이어","8%","-","10%"],["비디오게임","0%","-","10%"],["전자올겐·신디사이저","8%","-","10%"]],
        "컴퓨터": [["노트북·데스크탑 PC","0%","-","10%"],["메모리·메인보드·카드","0%","-","10%"],["모뎀·라우터·랜카드","0%","-","10%"],["키보드·마우스·모니터","0%","-","10%"],["스캐너·프린터","0%","-","10%"],["노트북 주변장치(포트)","8%","-","10%"]],
        "유아용품": [["유아용 의류","8%","-","10%"],["완구·인형","8%","-","10%"],["유아용 카시트·캐리어","8%","-","10%"],["유아용 침대·보행기","8%","-","10%"]],
        "가정용품": [["주방용품","8%","-","10%"],["가구","8%","-","10%"],["조명기구","8%","-","10%"],["침구·커튼","10~13%","-","10%"]],
        "건강식품·식품": [["건강보조식품·비타민","8%","-","10%"],["일반 가공식품","8% 내외","-","10%"]]
      };
      function tariffHtml(){
        var cats = Object.keys(TARIFF);
        var tabs = cats.map(function(c,i){ return '<button type="button" class="tariff-tab'+(i===0?' on':'')+'" data-i="'+i+'">'+esc(c)+'</button>'; }).join('');
        var panels = cats.map(function(c,i){
          var rows = TARIFF[c].map(function(r){ return '<tr><td>'+esc(r[0])+'</td><td class="r">'+esc(r[1])+'</td><td class="r">'+esc(r[2])+'</td><td class="r">'+esc(r[3])+'</td></tr>'; }).join('');
          return '<div class="tariff-panel"'+(i===0?'':' hidden')+' data-i="'+i+'"><table class="fee-table"><tr><th>품목</th><th class="r">관세</th><th class="r">특소세 등</th><th class="r">부가세</th></tr>'+rows+'</table></div>';
        }).join('');
        return '<div class="tariff-tabs">'+tabs+'</div>'+panels;
      }
      function chargeHtml(){
        var fp = feeCfg.fee || {}, fx = feeCfg.fx || {};
        var pct = (fp.commissionPct != null ? fp.commissionPct : 3);
        var freeDays = (fp.freeStorageDays != null ? fp.freeStorageDays : 30);
        var perDay = Number(fp.storagePerDayKrw || 0);
        var fxApplied = Number(fx.applied || 0);
        var fxTxt = fxApplied > 0 ? ('100엔 = ' + Math.round(fxApplied).toLocaleString() + '원 (약 1엔 ' + (fxApplied/100).toFixed(1) + '원)') : '주문 시점 송금 환율로 적용';
        var won = function(n){ return '₩' + Number(n||0).toLocaleString(); };
        var grades = feeCfg.grades || [], rates = feeCfg.rates || [];
        var rRows = rates.filter(function(r){ return [0.5,1,2,3,5,10].indexOf(Number(r.kg)) >= 0; });
        var h = '<h2 class="guide-title">수수료 안내</h2><div class="guide-body">';
        h += '<div class="guide-tip">💡 OSS 비용은 <strong>① 상품가 + 구매대행 수수료(1차 결제)</strong> 와 <strong>② 국제배송비(2차 결제)</strong> 로 나뉘어요. 관·부가세는 통관 시 실비로 부과돼요.</div>';
        h += '<b class="gb-h">[서비스 종류]</b><table class="fee-table"><tr><th>구분</th><th>내용</th></tr><tr><td>구매대행</td><td>상품 구매부터 한국 배송까지 OSS가 전부 대행</td></tr><tr><td>배송대행</td><td>고객님이 직접 구매 → OSS 일본센터로 받아 한국까지 배송</td></tr></table>';
        h += '<b class="gb-h">[결제 구조]</b><table class="fee-table"><tr><th>구분</th><th>결제 항목</th></tr><tr><td>1차 결제</td><td>상품가 + 구매대행 수수료 <span class="fee-big">' + pct + '%</span> <span style="color:#8a7f76;font-size:13px;">(배송대행은 1차 없음)</span></td></tr><tr><td>2차 결제</td><td>국제배송비(무게 기준) — 입고·측정 후 안내</td></tr><tr><td>통관 시</td><td>관·부가세 — 면세 한도 초과 시 실비(고객 부담)</td></tr></table>';
        h += '<b class="gb-h">[기타 비용]</b><table class="fee-table"><tr><th>항목</th><th class="r">비용</th></tr><tr><td>기본 검수(수량·색상·파손 확인)</td><td class="r">무료</td></tr><tr><td>무료 보관</td><td class="r">입고 후 ' + freeDays + '일</td></tr><tr><td>보관료(무료기간 초과)</td><td class="r">' + (perDay > 0 ? won(perDay) + ' / 일' : '무료') + '</td></tr><tr><td>국내 배송비</td><td class="r">무료</td></tr></table>';
        if (grades.length){
          h += '<b class="gb-h">[회원등급 배송비 할인]</b><table class="fee-table"><tr><th>등급</th><th class="r">국제배송비 할인</th></tr><tr><td>비회원</td><td class="r">-</td></tr>';
          grades.forEach(function(g){ h += '<tr><td>' + esc(g.name || '') + '</td><td class="r">' + (Number(g.discountPct) || 0) + '%</td></tr>'; });
          h += '</table>';
        }
        h += '<b class="gb-h">[적용 환율]</b><div class="gb-check">' + esc(fxTxt) + '</div>';
        if (rRows.length){
          h += '<b class="gb-h">[국제배송 요금(일부)]</b><table class="fee-table"><tr><th>무게</th><th class="r">항공</th></tr>';
          rRows.forEach(function(r){ h += '<tr><td>' + r.kg + 'kg</td><td class="r">' + Number(r.air || 0).toLocaleString() + '엔</td></tr>'; });
          h += '</table><div class="gb-check">전체 요금표는 <strong>국제배송 요금안내</strong>, 정확한 예상비용은 홈 \'예상비용 계산\'에서 확인하세요.</div>';
        }
        h += '<div class="guide-warning">⚠️ 1차 결제(상품 구매) 후에는 취소·변경이 어려워요. 가격 허위신고(언더밸류) 등 불법 통관 요청에는 협조하지 않습니다.</div>';
        return h + '</div>';
      }
      function show(slug) {
        if (slug === "guide-charge") { content.innerHTML = chargeHtml(); nav.querySelectorAll(".guide-nav-btn").forEach((b) => b.classList.toggle("active", b.dataset.slug === slug)); return; }
        const d = loaded[slug];
        let extra = "";
        if (slug === "guide-center") extra = '<div style="margin-top:14px;"><button type="button" id="copyCenterBtn" class="btn btn-primary">📋 배송센터 주소 복사</button> <span id="copyCenterMsg" style="font-size:13px;color:#1F9D6B;font-weight:600;"></span></div>';
        const bodyHtml = linkify(d.body).replace("{{TARIFF}}", tariffHtml());
        content.innerHTML = `<h2 class="guide-title">${esc(d.title)}</h2><div class="guide-body">${bodyHtml}</div>${extra}`;
        const tabsBox = content.querySelector(".tariff-tabs");
        if (tabsBox) tabsBox.addEventListener("click", function (e) {
          const b = e.target.closest(".tariff-tab"); if (!b) return;
          const i = b.dataset.i;
          tabsBox.querySelectorAll(".tariff-tab").forEach((x) => x.classList.toggle("on", x.dataset.i === i));
          content.querySelectorAll(".tariff-panel").forEach((p) => { p.hidden = (p.dataset.i !== i); });
        });
        if (slug === "guide-center") {
          const cb = document.getElementById("copyCenterBtn");
          if (cb) cb.addEventListener("click", function () {
            const msg = document.getElementById("copyCenterMsg");
            navigator.clipboard.writeText(d.body).then(
              function () { msg.textContent = "✓ 복사됐어요! 일본 쇼핑몰 배송지에 붙여넣으세요."; },
              function () { msg.style.color = "#c0392b"; msg.textContent = "복사 실패 — 주소를 길게 눌러 직접 복사해 주세요."; }
            );
          });
        }
        nav.querySelectorAll(".guide-nav-btn").forEach((b) => b.classList.toggle("active", b.dataset.slug === slug));
      }
      nav.querySelectorAll(".guide-nav-btn").forEach((b) => b.addEventListener("click", () => show(b.dataset.slug)));
      var _hash = (location.hash || "").replace("#", "");
      show(_hash && loaded[_hash] ? _hash : GUIDE_PAGES[0].slug);
      window.addEventListener("hashchange", function () { var s = (location.hash || "").replace("#", ""); if (s && loaded[s]) show(s); });
    })();
  </script>
</body>
</html>
