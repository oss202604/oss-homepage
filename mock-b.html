<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>시안 B · 소프트 파스텔</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;color:#2b2b2b;background:#fff;-webkit-font-smoothing:antialiased;}
  .wrap{width:min(1120px,100% - 40px);margin:0 auto;}
  a{text-decoration:none;color:inherit;}
  header{background:#fff;border-bottom:1px solid #f0f0f0;}
  .hd{display:flex;align-items:center;gap:24px;height:74px;}
  .logo{font-size:24px;font-weight:900;letter-spacing:-1px;}.logo b{color:#ff7a30;}
  .search{flex:1;display:flex;background:#f6f4f2;border-radius:14px;padding:13px 18px;align-items:center;color:#aaa;font-size:15px;}
  nav.menu{display:flex;gap:26px;font-size:15px;font-weight:600;color:#555;}
  .hero{background:#fff4ec;}
  .hero .in{display:flex;align-items:center;justify-content:space-between;padding:64px 0;gap:30px;}
  .badge{display:inline-block;background:#fff;color:#ff7a30;font-weight:700;font-size:14px;padding:8px 16px;border-radius:999px;margin-bottom:20px;box-shadow:0 4px 12px rgba(255,122,48,.15);}
  .hero h1{font-size:46px;font-weight:900;line-height:1.2;letter-spacing:-1.5px;margin-bottom:16px;}.hero h1 span{color:#ff7a30;}
  .hero p{font-size:17px;color:#7a756f;margin-bottom:26px;line-height:1.6;}
  .btn{display:inline-block;padding:16px 28px;border-radius:14px;font-size:16px;font-weight:700;background:#ff7a30;color:#fff;box-shadow:0 8px 20px rgba(255,122,48,.3);}
  .mascot{width:230px;height:230px;flex-shrink:0;}
  .quick{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:-36px auto 0;position:relative;}
  .qc{background:#fff;border-radius:20px;padding:26px 20px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.06);border:1px solid #f3f0ed;}
  .qc .ic{width:54px;height:54px;border-radius:16px;background:#fff4ec;color:#ff7a30;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;}
  .qc h3{font-size:16px;}
  .sec{padding:70px 0;}
  @media(max-width:760px){.menu,.search{display:none;}.hero .in{flex-direction:column;text-align:center;}.hero h1{font-size:34px;}.quick{grid-template-columns:1fr 1fr;}}
</style></head>
<body>
<header><div class="wrap hd">
  <div class="logo">OSS<b>.</b></div>
  <div class="search">상품명 또는 상품 링크를 입력하세요</div>
  <nav class="menu"><a>구매대행</a><a>배송대행</a><a>고객센터</a></nav>
</div></header>

<section class="hero"><div class="wrap in">
  <div>
    <span class="badge">원스톱 일본 쇼핑</span>
    <h1>편리한 일본직구,<br/><span>OSS</span>가 다 해드려요</h1>
    <p>메루카리·라쿠텐·야후옥션 등 모든 일본 상품을<br/>구매부터 안전 배송까지 한 번에.</p>
    <a class="btn">구매대행 신청하기 →</a>
  </div>
  <svg class="mascot" viewBox="0 0 220 220" fill="none">
    <ellipse cx="110" cy="198" rx="64" ry="10" fill="rgba(0,0,0,.08)"/>
    <rect x="48" y="80" width="124" height="104" rx="18" fill="#fff" stroke="#2b2b2b" stroke-width="5"/>
    <rect x="40" y="60" width="140" height="30" rx="11" fill="#fff" stroke="#2b2b2b" stroke-width="5"/>
    <rect x="98" y="62" width="24" height="26" rx="2" fill="#ffc83d"/>
    <circle cx="92" cy="122" r="7.5" fill="#2b2b2b"/><circle cx="128" cy="122" r="7.5" fill="#2b2b2b"/>
    <circle cx="79" cy="137" r="6" fill="#ffb3c1"/><circle cx="141" cy="137" r="6" fill="#ffb3c1"/>
    <path d="M100 136 Q110 148 120 136" stroke="#2b2b2b" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M150 44 l22 -8 -8 22 -5 -9 -9 -5z" fill="#ff7a30"/>
  </svg>
</div></section>

<div class="wrap"><div class="quick">
  <a class="qc"><span class="ic"><svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="20" height="18" rx="2"/><path d="M3 9h20"/></svg></span><h3>구매대행 신청</h3></a>
  <a class="qc"><span class="ic"><svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3l9 5v10l-9 5-9-5V8z"/></svg></span><h3>배송대행 신청</h3></a>
  <a class="qc"><span class="ic"><svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="16" height="20" rx="2"/><path d="M9 7h8M9 11h8"/></svg></span><h3>예상비용 계산</h3></a>
  <a class="qc"><span class="ic"><svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13" cy="13" r="10"/><path d="M13 8v5l3 2"/></svg></span><h3>주문 조회</h3></a>
</div></div>
<div class="sec"></div>
</body></html>
